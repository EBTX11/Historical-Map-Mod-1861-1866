  PRU_je_1_status_desc_2:0 "Diplomatic tensions with France are #gold escalating#!, and the prospect of conflict grows increasingly likely"
  PRU_je_1_status_desc_3:0 "War with France now appears #r inevitable#!. Both nations prepare for a decisive confrontation."
