  treaty_treaty_of_the_triple_alliance:0 "Treaty of the Triple Alliance"
  BRZ_je_1:0 "War of the Triple Alliance"
  BRZ_je_1_reason:0 "The Rio de la Plata region has long been a stage for rival ambitions and fragile balances of power. The Empire of Brazil, determined to maintain its influence over Uruguay and contain its neighbors, watches with growing concern the rise of Paraguay under the leadership of Francisco Solano López.\n\nDriven by expansionist ambitions and unwilling to tolerate Brazilian interference in regional affairs, Paraguay appears ready to challenge the existing order in South America. The prospect of war now looms large, as alliances begin to take shape behind closed doors.\n\nShould conflict erupt, it will not be a mere border dispute, but a total war capable of reshaping the region for generations. The Empire must decide whether it is prepared to commit to a long and costly struggle to assert its dominance over the continent."
  BRZ_je_1_tt_1:0 "The War of the Triple Alliance is occurred."
