  ITA_je_1:0 "The Roman Question"
  ITA_je_1_reason:0 "Rome, the spiritual heart of Christendom and a symbol of our unfinished unity, remains beyond our control. As long as France protects the Holy See, any direct action would be perilous.\nYet if Paris is distracted by other conflicts, an opportunity may arise…\n\nBy steadily increasing pressure on the Papal States, we may prepare the way for our troops to enter the Eternal City and complete the unification of Italy."
  ITA_je_1_button_1:0 "Increase Pressure on Rome"
  ITA_je_1_button_1_desc:0 "Taking advantage of France’s distraction, we strengthen our military and political presence around Rome. Each move brings us closer to an inevitable confrontation."
  ITA_je_1_button_1_tt_possible_1:0 "Nothing"
  ITA_je_1_button_1_tt_effect_1:0 "Nothing"
  ITA_je_1_button_2:0 "Enter Rome"
  ITA_je_1_button_2_desc:0 "The time has come. France is absent, and Rome lies within our grasp. By breaching its walls, we shall complete the unification of Italy."
  ITA_je_1_button_2_tt_possible_1:0 "The pressure is greater than 90"
  ITA_je_1_button_2_tt_effect_1:0 "Nothing" 
