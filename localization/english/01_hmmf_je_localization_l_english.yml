  AUS_je_1:0 "Accept the Hungarian Compromise"
  AUS_je_1_reason:0 "Our defeat against Prussia has severely weakened imperial authority. Hungary, though still under our control, now demands genuine autonomy. Refusing these demands risks fueling unrest and accelerating the Empire’s collapse. By accepting a compromise, we may preserve our power by transforming the Empire into a dual monarchy."
  AUS_je_1_button_1:0 "Accept the Hungarian Compromise"
