  FRA_je_1:0 "French intervention in Mexico"
  FRA_je_1_reason:0 "Au lendemain de la Guerre de Sécession, l’équilibre des puissances sur le continent américain demeure fragile. Profitant de l’affaiblissement temporaire des États-Unis, la France, sous l’impulsion de Napoléon III, relance son ambition impériale en Amérique.\n\nOfficiellement motivée par des créances impayées et la nécessité de rétablir l’ordre, cette nouvelle intervention masque un objectif bien plus vaste : établir un bastion monarchique durable au cœur du Mexique, capable de contrebalancer l’influence grandissante des États-Unis sur le continent.\n\nLe projet repose sur la restauration d’un régime impérial, incarné par Maximilien Ier du Mexique, dont la légitimité reste contestée face aux forces républicaines menées par Benito Juárez. Tandis que les troupes françaises tentent de stabiliser le pays, la résistance locale s’intensifie, alimentée par un sentiment national et soutenue en sous-main par les intérêts américains.\n\nÀ mesure que les États-Unis sortent renforcés de leur guerre civile, la tolérance envers une présence européenne en Amérique s’amenuise. Fidèles à la Doctrine Monroe, ils pourraient bientôt considérer cette intervention comme une menace directe.\n\nLa France doit désormais faire un choix : s’enliser dans une guerre lointaine pour préserver son prestige et son influence, ou se retirer avant que le conflit ne dégénère en confrontation ouverte avec une puissance montante."
  FRA_je_1_tt_complete_1:0 "France maintains the status quo during [GetGlobalVariable('FRA_je_1_global_variable_progress_bar_1').GetValue|D]/10 Years"
  FRA_je_1_1_progress_bar:0 "Progress Bar"
  FRA_je_1_1_progress_bar_desc:0 "1 Years of French rule in Mexico [GetGlobalVariable('FRA_je_1_global_variable_progress_bar_1').GetValue|D]/10 Years"

  MEX_je_1_tt_complete_1:0 "Imperial Longevity [GetGlobalVariable('MEX_je_1_global_variable_progress_bar_1').GetValue|D]/ 20"

  MEX_je_1:0 "The Precarious Crown of Mexico"
  MEX_je_1_reason:0 "Installed upon a throne far from his homeland, Maximilien Ier du Mexique reigns over an empire that exists more by foreign will than by national consent. Backed by the ambitions of Napoléon III, the Mexican crown stands—but on fragile foundations.\n\nBeneath the surface, unrest grows. Republican forces remain defiant, loyalties are divided, and the presence of foreign troops fuels resentment among the population. What was envisioned as a shining imperial project now risks becoming a costly and unstable entanglement.\n\nAs years pass, the illusion of stability may shatter. The crown endures—for now—but each decision will determine whether it is secured… or swept away."
  MEX_je_1_1_progress_bar:0 "Imperial Longevity"
  MEX_je_1_1_progress_bar_desc:0 "Imperial Longevity [GetGlobalVariable('MEX_je_1_global_variable_progress_bar_1').GetValue|D]/ 20"
  MEX_je_1_button_1:0 "Assert Sovereignty"
  MEX_je_1_button_1_desc:0 "In an effort to calm internal unrest and reinforce the image of an independent state, the imperial government publicly distances itself from French influence. While this may reassure parts of the population, it risks straining relations with France, upon which the Empire still heavily depends."
  MEX_je_1_button_1_tt_possible_1:0 "Nothing"
  MEX_je_1_button_1_tt_effect_1:0 "Nothing"

  USA_je_2_1_progress_bar:0 "Escalation with France"
  USA_je_2_1_progress_bar_desc:0 "Escalation with France [GetGlobalVariable('USA_je_2_global_variable_progress_bar_1').GetValue|D]/ 100"

  USA_je_2:0 "The Mexican Question"
  USA_je_2_reason:0 "The presence of a European-backed monarchy in Mexico stands as a direct challenge to American influence on the continent. As Napoléon III seeks to establish a lasting foothold through the rule of Maximilien Ier du Mexique, the United States cannot ignore the implications of foreign intervention so close to its borders.\n\nThough recent conflicts have limited immediate action, the foundations of American policy remain unchanged. The principles of the Doctrine Monroe demand that no external power impose its will upon the nations of the New World.\n\nAs tensions rise, public opinion hardens and political pressure mounts. Whether through diplomacy, covert support, or open confrontation, the United States may soon be compelled to act."

  USA_je_1_button_1:0 "Initiative des USA"
  USA_je_1_button_1_desc:0 "Seizing the initiative, we shall leverage our superior military might to reclaim the Confederacy state by state and restore the Union"
  USA_je_1_button_1_tt_possible_1:0 "Our military strength surpasses that of the Confederacy"
  USA_je_1_button_1_tt_possible_2:0 "Not is at War"
  USA_je_1_button_1_tt_effect_1:0 "The United States enters the war to reclaim the secessionist states and restore the Union"
  USA_je_1_button_2:0 "Initiative des CSA"
  USA_je_1_button_2_desc:0 "With our superior military strength, we shall secure the stability of our young nation and reclaim the states rightfully ours"
  USA_je_1_button_2_tt_possible_1:0 "Our military strength surpasses that of the Union"
  USA_je_1_button_2_tt_possible_2:0 "Not is at War"
  USA_je_1_button_2_tt_effect_1:0 "he Confederacy enters the war to secure the secessionist states, forge a new nation, and nullify all Union claims"
  USA_je_1_button_3:0 "The Confederacy ends the war"
  USA_je_1_button_3_desc:0 "The Confederacy brings the Civil War to an end."
  USA_je_1_button_3_tt_possible_1:0 "Fewer than two secessionist states remain."
  USA_je_1_button_3_tt_effect_1:0 "The Confederacy capitulates, and the remaining secessionist states rejoin the Union"
  USA_je_1_button_4:0 "Break the Truce"
  USA_je_1_button_4_desc:0 "The current peace is little more than a temporary pause in an inevitable confrontation. By deliberately escalating tensions and exploiting diplomatic pressure, the United States can undermine the legitimacy of existing agreements and hasten the end of the truce. Such actions, however, risk further destabilizing relations and bringing both nations closer to open conflict."
  USA_je_1_button_4_tt_possible_1:0 "Nothing"
  USA_je_1_button_4_tt_effect_1:0 "reduces peace to 24 months"
  USA_je_2_status_desc_1:0 "Diplomatic Balance"
  USA_je_2_status_desc_2:0 "Rising Tensions"
  USA_je_2_status_desc_3:0 "Crisis with France"
  USA_je_2_button_1:0 "Support Mexican Republicans"
  USA_je_2_button_1_desc:0 "Determined to uphold its influence in the Americas, the United States covertly supports the republican forces opposing the imperial regime in Mexico. By providing resources, intelligence, and diplomatic backing, Washington seeks to weaken the rule of Maximilien Ier du Mexique and hasten the collapse of the French-backed monarchy."
  USA_je_2_button_1_tt_possible_1:0 "A revolution is underway in Mexico"
  USA_je_2_button_1_tt_effect_1:0 "The USA will join all revolutionary wars against the Mexican Empire."
  USA_je_2_button_2:0 "Undermine the Mexican Empire"
  USA_je_2_button_2_desc:0 "Through covert operations, propaganda, and political interference, the United States works to destabilize the fragile Mexican Empire. These actions fuel unrest and deepen divisions within the country, gradually eroding the foundations of imperial authority."
  USA_je_2_button_2_tt_possible_1:0 "Nothing"
  USA_je_2_button_2_tt_effect_1:0 "augmente les tention avec la france de 5"
  USA_je_2_button_3:0 "Provoke the French Empire"
  USA_je_2_button_3_desc:0 "Openly condemning France’s presence in Mexico, the United States adopts an increasingly confrontational stance. Through diplomatic pressure, public denunciations, and deliberate provocations, Washington seeks to challenge French influence and escalate tensions between the two powers."
  USA_je_2_button_3_tt_possible_1:0 "Nothing"
  USA_je_2_button_3_tt_effect_1:0 "augmente les tention avec la france de 5"
  USA_je_2_button_4:0 "Intervene in Mexico"
  USA_je_2_button_4_desc:0 "The continued presence of French forces in Mexico has become intolerable. With tensions reaching a breaking point, the United States can no longer remain idle while a foreign power imposes its will upon the continent. Invoking the principles of the Doctrine Monroe, America prepares to act decisively to restore Mexican sovereignty—by force, if necessary."
  USA_je_2_button_4_tt_possible_1:0 "This is possible if France and the USA enter into a diplomatic crisis."
  USA_je_2_button_4_tt_effect_1:0 "The United States enters the war against France to restore Mexico’s independence"

  PRU_je_1:0 "By Iron and Blood"
  PRU_je_1_reason:0 "Prussia’s ambition to unify Germany through force now clashes with France’s determination to preserve the balance of power in Europe.\nBeneath mounting diplomatic tensions lies the prospect of an inevitable conflict: German unity or French supremacy.\nThe fate of the continent may soon be decided on the battlefield."
