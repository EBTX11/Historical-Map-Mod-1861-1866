  USA_je_1:0 "A House Divided"
  USA_je_1_reason:0 "The United States stand fractured, divided by irreconcilable differences over the future of the nation. What began as a political crisis has erupted into open conflict, as states take up arms either to preserve the Union or to secure their independence.\n\nBoth sides believe their cause to be just, and neither appears willing to yield. The outcome of this struggle will determine not only the fate of the Confederacy, but the very nature of the American nation itself.\n\nWill the Union be restored, or will a new nation rise from its ashes?"
 

